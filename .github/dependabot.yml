version: 2

x-npm-schedule: &npm-schedule
  interval: "daily"

x-npm-cooldown: &npm-cooldown
  default-days: 7
  exclude:
    # Allow immediate updates of self-owned packages
    - "@azure-tools/*"
    - "@autorest/*"
    - "@azure/*"
    - "@microsoft.azure/*"
    - "@typespec/*"
    - "oav"

x-npm-groups: &npm-groups
  typespec:
    patterns:
      - "*typespec*"
  eslint:
    patterns:
      - "*eslint*"

x-npm-ignore: &npm-ignore
  # Updated manually to align with minimum supported Node version
  - dependency-name: "@types/node"

updates:
  - package-ecosystem: "npm"
    directories:
      - "/eng/packages/http-client-csharp-management"
    schedule: *npm-schedule
    cooldown: *npm-cooldown
    ignore: *npm-ignore
    groups: *npm-groups
    versioning-strategy: increase-if-necessary
